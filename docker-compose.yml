services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: is_dev
      POSTGRES_USER: is
      POSTGRES_PASSWORD: dev
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U is -d is_dev']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
