name: Build, push, deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/clappediya/intelligent-singularity-website
  NODE_VERSION: '24'
  PNPM_VERSION: '9.12.0'

jobs:
  gates:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Tests
        run: pnpm test

      - name: Authenticity gate
        run: pnpm verify:authenticity

      - name: Readability gate
        run: pnpm readability

      - name: Outbound links gate
        run: pnpm verify:outbound-links

  build:
    name: Build and push image
    needs: gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      image_full: ${{ steps.tag.outputs.full }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        env:
          IMAGE_BASE: ${{ env.IMAGE }}
        run: |
          TAG="prod-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA:0:7}"
          FULL="${IMAGE_BASE}:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full=${FULL}" >> "$GITHUB_OUTPUT"
          echo "Building ${FULL}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.full }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: Deploy to Dokploy production
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://intelligentsingularityinc.com/en
    steps:
      - name: Roll Docker Swarm service
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_FULL: ${{ needs.build.outputs.image_full }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        with:
          host: 184.70.179.66
          username: md
          password: ${{ secrets.DOKPLOY_SSH_PASSWORD }}
          port: 22
          command_timeout: 5m
          envs: IMAGE_FULL,IMAGE_TAG
          script: |
            set -e
            echo "Updating is-website-gbydeh to ${IMAGE_TAG}"
            docker service update \
              --image "${IMAGE_FULL}" \
              --update-parallelism 1 \
              --update-delay 10s \
              --update-failure-action rollback \
              --update-monitor 30s \
              is-website-gbydeh
            docker service ls | grep is-website-gbydeh
            docker ps --filter name=is-website-gbydeh --format "{{.Names}}\t{{.Status}}\t{{.Image}}"

      - name: Verify production HTTP
        run: |
          set -e
          echo "Waiting 20s for service to settle..."
          sleep 20
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 https://intelligentsingularityinc.com/en || echo '000')
            BODY=$(curl -sS --max-time 15 https://intelligentsingularityinc.com/en | head -c 4096 || echo '')
            ERR_CHUNKS=$(printf '%s' "$BODY" | grep -c 'E{"digest' || true)
            if [ "$STATUS" = "200" ] && [ "$ERR_CHUNKS" -eq 0 ]; then
              echo "Attempt $i: 200 OK, 0 RSC errors"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS rsc_errors=$ERR_CHUNKS - retrying in 15s"
            sleep 15
          done
          echo "Production verification failed"
          exit 1
