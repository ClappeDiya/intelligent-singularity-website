<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" role="img" aria-labelledby="trust-pillars-title trust-pillars-desc">
  <title id="trust-pillars-title">Three pillars of trust — every claim linked to proof</title>
  <desc id="trust-pillars-desc">Three editorial pillars stand on a baseline — encryption, subprocessors, and incident response — each capped with a proof chip showing a verifiable signal.</desc>
  <defs>
    <style>
      .ink   { fill: #141413; }
      .ink-d { fill: rgba(20,20,19,0.62); }
      .ink-f { fill: rgba(20,20,19,0.38); }
      .mint  { fill: #6c8f7a; }
      .mint-i{ fill: #3e6750; }
      .s-ink { stroke: rgba(20,20,19,0.68); fill: none; }
      .s-mint{ stroke: #6c8f7a; fill: none; }
      .s-faint{stroke: rgba(20,20,19,0.14); fill: none; }
      .label { font-family: -apple-system, system-ui, "Segoe UI", sans-serif; font-size: 12px; fill: rgba(20,20,19,0.72); }
      .mono  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; fill: #3e6750; }
      .serif { font-family: ui-serif, Georgia, "Times New Roman", serif; font-weight: 600; fill: #141413; }
      .chip  { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; fill: #3e6750; }
    </style>
  </defs>

  <!-- Eyebrow -->
  <text class="mono" x="48" y="48">Trust · Where the proof lives</text>
  <text class="serif" x="48" y="82" font-size="22">Every claim links to evidence.</text>

  <!-- Baseline ground line -->
  <line x1="60" y1="308" x2="900" y2="308" class="s-ink" stroke-width="1"/>
  <!-- tick marks -->
  <g class="s-faint" stroke-width="1">
    <line x1="60"  y1="308" x2="60"  y2="314"/>
    <line x1="200" y1="308" x2="200" y2="314"/>
    <line x1="340" y1="308" x2="340" y2="314"/>
    <line x1="480" y1="308" x2="480" y2="314"/>
    <line x1="620" y1="308" x2="620" y2="314"/>
    <line x1="760" y1="308" x2="760" y2="314"/>
    <line x1="900" y1="308" x2="900" y2="314"/>
  </g>

  <!-- PILLAR 1: Encryption -->
  <g transform="translate(200,128)">
    <!-- Pillar body -->
    <rect x="-54" y="0" width="108" height="180" rx="4" fill="rgba(108,143,122,0.06)" stroke="rgba(20,20,19,0.2)" stroke-width="1"/>
    <!-- Pillar cap -->
    <rect x="-66" y="-14" width="132" height="14" rx="2" fill="#141413"/>
    <!-- Pillar base -->
    <rect x="-66" y="180" width="132" height="10" rx="2" fill="#141413" opacity="0.88"/>
    <!-- Flutes -->
    <line x1="-30" y1="10" x2="-30" y2="172" class="s-faint" stroke-width="1"/>
    <line x1="0"   y1="10" x2="0"   y2="172" class="s-faint" stroke-width="1"/>
    <line x1="30"  y1="10" x2="30"  y2="172" class="s-faint" stroke-width="1"/>

    <!-- Proof chip floating above cap -->
    <g transform="translate(0,-46)">
      <rect x="-58" y="-14" width="116" height="22" rx="11" fill="#faf9f5" stroke="rgba(108,143,122,0.45)" stroke-width="1"/>
      <text class="chip" x="0" y="2" text-anchor="middle">TLS 1.3 · LIVE</text>
    </g>

    <!-- Pillar title & body -->
    <text class="serif" x="0" y="44" text-anchor="middle" font-size="18">Encryption</text>
    <text class="label" x="0" y="72" text-anchor="middle" fill="rgba(20,20,19,0.66)">On every wire.</text>
    <text class="label" x="0" y="88" text-anchor="middle" fill="rgba(20,20,19,0.66)">Let's Encrypt, auto-rotated.</text>
    <text class="label" x="0" y="104" text-anchor="middle" fill="rgba(20,20,19,0.66)">Zero plaintext exits.</text>
  </g>

  <!-- PILLAR 2: Subprocessors -->
  <g transform="translate(480,128)">
    <rect x="-54" y="0" width="108" height="180" rx="4" fill="rgba(108,143,122,0.06)" stroke="rgba(20,20,19,0.2)" stroke-width="1"/>
    <rect x="-66" y="-14" width="132" height="14" rx="2" fill="#141413"/>
    <rect x="-66" y="180" width="132" height="10" rx="2" fill="#141413" opacity="0.88"/>
    <line x1="-30" y1="10" x2="-30" y2="172" class="s-faint" stroke-width="1"/>
    <line x1="0"   y1="10" x2="0"   y2="172" class="s-faint" stroke-width="1"/>
    <line x1="30"  y1="10" x2="30"  y2="172" class="s-faint" stroke-width="1"/>

    <g transform="translate(0,-46)">
      <rect x="-60" y="-14" width="120" height="22" rx="11" fill="#faf9f5" stroke="rgba(108,143,122,0.45)" stroke-width="1"/>
      <text class="chip" x="0" y="2" text-anchor="middle">0 3RD-PARTY · WEB</text>
    </g>

    <text class="serif" x="0" y="44" text-anchor="middle" font-size="18">Subprocessors</text>
    <text class="label" x="0" y="72" text-anchor="middle" fill="rgba(20,20,19,0.66)">Named, not named-later.</text>
    <text class="label" x="0" y="88" text-anchor="middle" fill="rgba(20,20,19,0.66)">Purpose · access · region.</text>
    <text class="label" x="0" y="104" text-anchor="middle" fill="rgba(20,20,19,0.66)">CI blocks pixel sneak-ins.</text>
  </g>

  <!-- PILLAR 3: Incident response -->
  <g transform="translate(760,128)">
    <rect x="-54" y="0" width="108" height="180" rx="4" fill="rgba(108,143,122,0.06)" stroke="rgba(20,20,19,0.2)" stroke-width="1"/>
    <rect x="-66" y="-14" width="132" height="14" rx="2" fill="#141413"/>
    <rect x="-66" y="180" width="132" height="10" rx="2" fill="#141413" opacity="0.88"/>
    <line x1="-30" y1="10" x2="-30" y2="172" class="s-faint" stroke-width="1"/>
    <line x1="0"   y1="10" x2="0"   y2="172" class="s-faint" stroke-width="1"/>
    <line x1="30"  y1="10" x2="30"  y2="172" class="s-faint" stroke-width="1"/>

    <g transform="translate(0,-46)">
      <rect x="-56" y="-14" width="112" height="22" rx="11" fill="#faf9f5" stroke="rgba(108,143,122,0.45)" stroke-width="1"/>
      <text class="chip" x="0" y="2" text-anchor="middle">ACK ≤ 1 DAY</text>
    </g>

    <text class="serif" x="0" y="44" text-anchor="middle" font-size="18">Incident</text>
    <text class="label" x="0" y="72" text-anchor="middle" fill="rgba(20,20,19,0.66)">Acknowledged in a day.</text>
    <text class="label" x="0" y="88" text-anchor="middle" fill="rgba(20,20,19,0.66)">Published post-mortem.</text>
    <text class="label" x="0" y="104" text-anchor="middle" fill="rgba(20,20,19,0.66)">Researchers credited.</text>
  </g>

  <!-- Footer rule + bylines -->
  <g transform="translate(60,340)">
    <text class="mono" x="0" y="0">Every pillar links to live proof · last reviewed in this release</text>
  </g>
</svg>
