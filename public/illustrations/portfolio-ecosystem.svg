<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="portfolio-ecosystem-title portfolio-ecosystem-desc">
  <title id="portfolio-ecosystem-title">Ecosystem of fourteen tools on one shared stack</title>
  <desc id="portfolio-ecosystem-desc">Fourteen product tiles orbit a single shared-stack core across business, health, finance, agriculture, media, and infrastructure verticals.</desc>
  <defs>
    <style>
      .ink   { fill: #141413; }
      .ink-d { fill: rgba(20,20,19,0.62); }
      .ink-f { fill: rgba(20,20,19,0.38); }
      .mint  { fill: #6c8f7a; }
      .mint-i{ fill: #3e6750; }
      .s-ink { stroke: rgba(20,20,19,0.68); fill: none; }
      .s-mint{ stroke: #6c8f7a; fill: none; }
      .s-faint{stroke: rgba(20,20,19,0.14); fill: none; }
      .label { font-family: -apple-system, system-ui, "Segoe UI", sans-serif; font-size: 11.5px; fill: rgba(20,20,19,0.72); }
      .mono  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; fill: #3e6750; }
      .serif { font-family: ui-serif, Georgia, "Times New Roman", serif; font-weight: 600; fill: #141413; }
      .tile-label { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 9.5px; letter-spacing: 0.1em; fill: rgba(20,20,19,0.72); text-transform: uppercase; }
    </style>
  </defs>

  <!-- Eyebrow -->
  <text class="mono" x="48" y="48">Portfolio · Ecosystem view</text>
  <text class="serif" x="48" y="82" font-size="22">One shared stack. Fourteen tools. Six verticals.</text>

  <!-- Orbit rings centred at (480, 260) -->
  <g transform="translate(480,260)">
    <circle cx="0" cy="0" r="150" class="s-faint" stroke-width="1" stroke-dasharray="2 4"/>
    <circle cx="0" cy="0" r="84"  class="s-mint" stroke-width="1" opacity="0.45"/>

    <!-- Core: shared stack -->
    <circle cx="0" cy="0" r="52" fill="#141413"/>
    <circle cx="0" cy="0" r="52" class="s-mint" stroke-width="1" opacity="0.5"/>
    <text x="0" y="-4" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="13" font-weight="600" fill="#faf9f5">One stack</text>
    <text x="0" y="14" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="0.14em" fill="#6c8f7a">NEXT · PAYLOAD · PG</text>

    <!-- 14 product tiles on the outer orbit (ring r=150) -->
    <!-- Pre-computed positions on a 150-radius circle, 14 evenly spaced steps.
         Angle step = 360/14 ≈ 25.714°, starting at -90° (top). -->
    <g>
      <!-- 1 top (0°): ClapWork - Business -->
      <g transform="translate(0,-150)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">ClapWork</text>
      </g>
      <!-- 2 (25.7°) -->
      <g transform="translate(65.1,-135.25)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">ClapBill</text>
      </g>
      <!-- 3 (51.4°) -->
      <g transform="translate(117.2,-93.7)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">ClapPay</text>
      </g>
      <!-- 4 (77.1°) -->
      <g transform="translate(146.2,-33.4)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">ClapFin</text>
      </g>
      <!-- 5 (102.9°) -->
      <g transform="translate(146.2,33.4)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">ClapDiet</text>
      </g>
      <!-- 6 (128.6°) -->
      <g transform="translate(117.2,93.7)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">ClapMed</text>
      </g>
      <!-- 7 (154.3°) -->
      <g transform="translate(65.1,135.25)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">ClapMove</text>
      </g>
      <!-- 8 bottom (180°) -->
      <g transform="translate(0,150)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">ClapWorld</text>
      </g>
      <!-- 9 (205.7°) -->
      <g transform="translate(-65.1,135.25)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">Clappe</text>
      </g>
      <!-- 10 (231.4°) -->
      <g transform="translate(-117.2,93.7)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">Nestbitt</text>
      </g>
      <!-- 11 (257.1°) -->
      <g transform="translate(-146.2,33.4)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">Apogee</text>
      </g>
      <!-- 12 (282.9°) -->
      <g transform="translate(-146.2,-33.4)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">RateAds</text>
      </g>
      <!-- 13 (308.6°) -->
      <g transform="translate(-117.2,-93.7)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">AiNotes</text>
      </g>
      <!-- 14 (334.3°) -->
      <g transform="translate(-65.1,-135.25)">
        <rect x="-34" y="-14" width="68" height="28" rx="8" fill="#faf9f5" stroke="rgba(20,20,19,0.22)" stroke-width="1"/>
        <text class="tile-label" x="0" y="4" text-anchor="middle">GClap</text>
      </g>
    </g>

    <!-- Thin radial connectors -->
    <g class="s-faint" stroke-width="1" opacity="0.7">
      <line x1="0" y1="-52" x2="0" y2="-136"/>
      <line x1="45" y1="-26" x2="117" y2="-81"/>
      <line x1="52" y1="0"  x2="132" y2="0"/>
      <line x1="45" y1="26" x2="117" y2="81"/>
      <line x1="0"  y1="52" x2="0"  y2="136"/>
      <line x1="-45" y1="26" x2="-117" y2="81"/>
      <line x1="-52" y1="0"  x2="-132" y2="0"/>
      <line x1="-45" y1="-26" x2="-117" y2="-81"/>
    </g>
  </g>

  <!-- Left legend -->
  <g transform="translate(48,140)">
    <text class="mono" x="0" y="0">Verticals</text>
    <g class="ink-d" font-family="-apple-system, system-ui, sans-serif" font-size="12">
      <circle cx="6" cy="22" r="4" class="mint"/>
      <text x="18" y="26">Business · Health · Finance</text>
      <circle cx="6" cy="44" r="4" class="s-ink" stroke-width="1.25" fill="#faf9f5"/>
      <text x="18" y="48">Agri · Media · Comms</text>
      <circle cx="6" cy="66" r="4" class="ink"/>
      <text x="18" y="70">Infrastructure · shared</text>
    </g>
  </g>

  <!-- Right stats -->
  <g transform="translate(808,140)">
    <text class="mono" x="0" y="0" text-anchor="end">By the numbers</text>
    <g class="ink-d" font-family="-apple-system, system-ui, sans-serif" font-size="12">
      <text x="0" y="22" text-anchor="end">14 tools</text>
      <text x="0" y="40" text-anchor="end">5 live · 9 in staging</text>
      <text x="0" y="58" text-anchor="end">6 verticals</text>
      <text x="0" y="76" text-anchor="end">0 third-party calls</text>
    </g>
  </g>
</svg>
